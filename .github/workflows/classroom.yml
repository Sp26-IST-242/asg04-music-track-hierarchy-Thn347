name: Autograding Tests
on:
  push:
  repository_dispatch:
permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies & pin pytest (diagnostic)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest==8.4.2

      - name: Diagnostic - run pytest (full trace)
        id: run-pytest
        continue-on-error: true
        run: |
          echo "===== Diagnostic pytest run (verbose, full-trace) ====="
          pytest -vv --full-trace -s || true
          echo "===== End diagnostic pytest run ====="

      - name: Show environment and versions
        run: |
          python -V
          pip --version
          pytest --version || true
          pip list

      - name: test_music.py (autograder)
        id: test_music-py
        uses: classroom-resources/autograding-python-grader@v1
        with:
          timeout: 10
          max-score: 100
          # ensure this action's environment installs the same pytest version
          setup-command: |
            python -m pip install --upgrade pip
            if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
            pip install pytest==8.4.2

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          TEST_MUSIC-PY_RESULTS: "${{ steps.test_music-py.outputs.result }}"
        with:
          runners: test_music-py